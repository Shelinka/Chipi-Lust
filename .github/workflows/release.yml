name: Release to CurseForge

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate CurseForge secret
        shell: bash
        run: |
          if [ -z "${{ secrets.CURSEFORGE_API_KEY }}" ]; then
            echo "::error::Missing CURSEFORGE_API_KEY repository secret."
            echo "Go to Settings > Secrets and variables > Actions, then add CURSEFORGE_API_KEY."
            exit 1
          fi

      - name: Package and publish to CurseForge
        uses: BigWigsMods/packager@v2
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          CF_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
